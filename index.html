<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinguaFlow — Translator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="Translator.css">
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Language<span>Flow</span>
    </div>
    <div class="header-tag">Translator</div>
  </header>

  <main>
    <div class="hero">
      <h1>Translate Anything,<br>Instantly</h1>
      <p>25+ Languages · Zero friction</p>
    </div>

    <div class="card">
      <!-- Language bar -->
      <div class="lang-bar">
        <div class="lang-select-wrap">
          <label>From</label>
          <select id="sourceLang">
            <option value="auto">Auto Detect</option>
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="ar">Arabic</option>
            <option value="zh">Chinese (Simplified)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="it">Italian</option>
            <option value="nl">Dutch</option>
            <option value="tr">Turkish</option>
            <option value="bn">Bengali</option>
            <option value="ur">Urdu</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="mr">Marathi</option>
            <option value="pa">Punjabi</option>
            <option value="sw">Swahili</option>
            <option value="vi">Vietnamese</option>
            <option value="th">Thai</option>
            <option value="el">Greek</option>
            <option value="pl">Polish</option>
            <option value="uk">Ukrainian</option>
          </select>
          <span class="detected-badge" id="detectedBadge">Detected</span>
        </div>

        <button class="swap-btn" id="swapBtn" title="Swap languages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
          </svg>
        </button>

        <div class="lang-select-wrap" style="justify-content:flex-end">
          <label>To</label>
          <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="ar">Arabic</option>
            <option value="zh">Chinese (Simplified)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="it">Italian</option>
            <option value="nl">Dutch</option>
            <option value="tr">Turkish</option>
            <option value="bn">Bengali</option>
            <option value="ur">Urdu</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="mr">Marathi</option>
            <option value="pa">Punjabi</option>
            <option value="sw">Swahili</option>
            <option value="vi">Vietnamese</option>
            <option value="th">Thai</option>
            <option value="el">Greek</option>
            <option value="pl">Polish</option>
            <option value="uk">Ukrainian</option>
          </select>
        </div>
      </div>

      <!-- Text panels -->
      <div class="panels">
        <div class="panel panel-input">
          <textarea id="inputText" placeholder="Type or paste text here…" maxlength="5000"></textarea>
          <div class="panel-footer">
            <span class="char-count" id="charCount">0 / 5000</span>
            <div class="btn-row">
              <button class="icon-btn" id="clearInputBtn" title="Clear">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="panel panel-output">
          <textarea id="outputText" placeholder="Translation will appear here…" readonly></textarea>
          <div class="panel-footer">
            <span class="char-count" id="outCharCount">—</span>
            <div class="btn-row">
              <button class="icon-btn" id="copyBtn" title="Copy translation">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2"/>
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                Copy
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- ✅ Translate button row — teeno buttons ek saath -->
      <div class="translate-btn-wrap">

        <button class="clear-btn" id="clearAllBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18M19 6l-1 14H6L5 6M8 6V4h8v2"/>
          </svg>
          Clear All
        </button>

        <button class="translate-btn" id="translateBtn">
          <div class="spinner"></div>
          <span class="btn-text">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:6px">
              <path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>
            </svg>
            Translate
          </span>
        </button>

        <!-- ✅ Speak button — Clear All aur Translate ke saath -->
        <button class="speak-btn" id="speakBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
          Speak
        </button>

      </div>
    </div>

    <!-- Quick language pills -->
    <div class="quick-langs">
      <span>Quick:</span>
      <button class="lang-pill" data-lang="hi">🇮🇳 Hindi</button>
      <button class="lang-pill" data-lang="es">🇪🇸 Spanish</button>
      <button class="lang-pill" data-lang="fr">🇫🇷 French</button>
      <button class="lang-pill" data-lang="ar">🇸🇦 Arabic</button>
      <button class="lang-pill" data-lang="ja">🇯🇵 Japanese</button>
      <button class="lang-pill" data-lang="de">🇩🇪 German</button>
      <button class="lang-pill" data-lang="zh">🇨🇳 Chinese</button>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script src="Translator.js"></script>
</body>
</html>
